<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Glass overlay -->
  <rect x="24" y="24" width="464" height="464" rx="80" fill="white" fill-opacity="0.1"/>

  <!-- Central hexagon representing AI core -->
  <path d="M256 100 L356 168 L356 304 L256 372 L156 304 L156 168 Z"
        fill="none"
        stroke="url(#glow)"
        stroke-width="8"
        opacity="0.8"/>

  <!-- Inner circle -->
  <circle cx="256" cy="236" r="60" fill="none" stroke="white" stroke-width="6" opacity="0.9"/>

  <!-- Center dot -->
  <circle cx="256" cy="236" r="20" fill="white"/>

  <!-- Connection lines -->
  <line x1="256" y1="176" x2="256" y2="100" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="308" y1="206" x2="356" y2="168" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="308" y1="266" x2="356" y2="304" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="256" y1="296" x2="256" y2="372" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="204" y1="266" x2="156" y2="304" stroke="white" stroke-width="4" opacity="0.6"/>
  <line x1="204" y1="206" x2="156" y2="168" stroke="white" stroke-width="4" opacity="0.6"/>

  <!-- Corner nodes -->
  <circle cx="256" cy="100" r="12" fill="white"/>
  <circle cx="356" cy="168" r="12" fill="white"/>
  <circle cx="356" cy="304" r="12" fill="white"/>
  <circle cx="256" cy="372" r="12" fill="white"/>
  <circle cx="156" cy="304" r="12" fill="white"/>
  <circle cx="156" cy="168" r="12" fill="white"/>

  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="48" font-weight="700" opacity="0.9">AIOS</text>
</svg>
