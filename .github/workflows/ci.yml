name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Next.js Dashboard ──────────────────────────────────
  nextjs-typecheck:
    name: 'Next.js: TypeCheck'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  nextjs-build:
    name: 'Next.js: Build'
    runs-on: ubuntu-latest
    needs: [nextjs-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  # ─── Vite SPA (aios-platform) ──────────────────────────
  spa-lint:
    name: 'SPA: Lint'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aios-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aios-platform/package-lock.json
      - run: npm ci
      - run: npm run lint

  spa-typecheck:
    name: 'SPA: TypeCheck'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aios-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aios-platform/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  spa-test:
    name: 'SPA: Test (2453 tests)'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aios-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aios-platform/package-lock.json
      - run: npm ci
      - run: npx vitest run --reporter=verbose
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spa-coverage
          path: aios-platform/coverage/
          retention-days: 7

  spa-build:
    name: 'SPA: Build'
    runs-on: ubuntu-latest
    needs: [spa-lint, spa-typecheck, spa-test]
    defaults:
      run:
        working-directory: aios-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: aios-platform/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Build size report
        run: |
          echo "### Build Size" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh dist/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─── Engine (Bun/Hono) ─────────────────────────────────
  engine-test:
    name: 'Engine: Test (98 tests)'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aios-platform/engine
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test tests/unit/
