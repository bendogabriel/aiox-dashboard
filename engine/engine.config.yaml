# AIOS Agent Execution Engine — Configuration
# Override defaults here. Engine reads this on boot.

# Project root resolution (portable mode)
# Empty = auto-detect by walking up from engine dir looking for .aios-core/
# Set to absolute path to point engine at a specific project.
project:
  root: ""                       # auto-detect if empty
  aios_core: ".aios-core"       # relative to root
  squads: "squads"              # relative to root
  rules: ".claude/rules"        # relative to root

server:
  port: 4002
  host: "0.0.0.0"
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:5174"
    - "http://localhost:5175"
    - "http://localhost:5176"
    - "http://localhost:3000"

pool:
  max_concurrent: 5          # max CLI processes (overridden by min(CPU_CORES, this))
  max_per_squad: 3           # prevent one squad from monopolizing
  spawn_timeout_ms: 30000    # max time to spawn CLI
  execution_timeout_ms: 300000  # 5 min default per job

queue:
  check_interval_ms: 1000    # how often to check for timed-out jobs
  max_attempts: 3            # retry failed jobs up to N times

memory:
  context_budget_tokens: 8000  # max tokens for context assembly
  recall_top_k: 10             # top-K memories per scope

workspace:
  base_dir: ".workspace"     # relative to engine root
  max_concurrent: 10         # max simultaneous workspaces
  cleanup_on_success: true   # remove workspace after successful job

claude:
  skip_permissions: false    # --dangerously-skip-permissions (use with caution)
  max_turns: -1              # -1 = unlimited, N = limit turns
  output_format: "stream-json"

auth:
  webhook_token: ""          # Bearer token for webhook auth (empty = no auth)

logging:
  level: "info"              # debug | info | warn | error
