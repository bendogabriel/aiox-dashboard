name: PR Alert & Auto-Fix

# Triggers when CI checks complete on PRs
on:
  check_suite:
    types: [completed]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  detect-failures:
    name: 'Detect CI Failures'
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'failure') ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested')
    steps:
      - name: Identify failing PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber, prTitle, prBranch;

            if (context.eventName === 'check_suite') {
              // Find PR associated with this check suite
              const suite = context.payload.check_suite;
              const prs = suite.pull_requests;
              if (!prs || prs.length === 0) {
                console.log('No PR associated with this check suite');
                return;
              }
              prNumber = prs[0].number;
              prBranch = suite.head_branch;
            } else {
              prNumber = context.payload.pull_request.number;
              prBranch = context.payload.pull_request.head.ref;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            prTitle = pr.title;

            core.setOutput('pr_number', prNumber);
            core.setOutput('pr_title', prTitle);
            core.setOutput('pr_branch', prBranch);
            core.setOutput('has_pr', 'true');

      - name: Collect failure details
        if: steps.find-pr.outputs.has_pr == 'true' && github.event_name == 'check_suite'
        id: failures
        uses: actions/github-script@v7
        with:
          script: |
            const suite = context.payload.check_suite;
            const { data: checkRuns } = await github.rest.checks.listForSuite({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_suite_id: suite.id,
            });

            const failures = checkRuns.check_runs
              .filter(r => r.conclusion === 'failure')
              .map(r => ({
                name: r.name,
                url: r.html_url,
                output: r.output?.summary || 'No summary',
              }));

            core.setOutput('failures', JSON.stringify(failures));
            core.setOutput('count', failures.length);

      - name: Post PR comment with failure report
        if: steps.find-pr.outputs.has_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.find-pr.outputs.pr_number }};
            const eventType = context.eventName;

            let body;
            if (eventType === 'check_suite') {
              const failures = JSON.parse('${{ steps.failures.outputs.failures || "[]" }}');
              const failureList = failures.map(f =>
                `| ${f.name} | [View logs](${f.url}) |`
              ).join('\n');

              body = `## 🔔 CI Failure Detected

            | Check | Details |
            |-------|---------|
            ${failureList}

            **Auto-fix available:** Run \`/fix-pr ${context.repo.owner}/${context.repo.repo}#${prNumber}\` in Claude Code to auto-fix.

            <sub>🤖 Generated by PR Alert workflow</sub>`;
            } else {
              const review = context.payload.review;
              body = `## 🔔 Changes Requested

            **Reviewer:** @${review.user.login}

            Review comments need attention. Run \`/fix-pr ${context.repo.owner}/${context.repo.repo}#${prNumber}\` in Claude Code to analyze and apply fixes.

            <sub>🤖 Generated by PR Alert workflow</sub>`;
            }

            // Check if we already commented recently (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 5,
            });

            const recentAlert = comments.find(c =>
              c.body.includes('Generated by PR Alert workflow') &&
              Date.now() - new Date(c.created_at).getTime() < 10 * 60 * 1000 // 10 min cooldown
            );

            if (recentAlert) {
              console.log('Alert already posted within 10 minutes, skipping');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
